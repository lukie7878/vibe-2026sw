<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 하루 평가기 ✨</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --card:    #21253a;
      --border:  #2e3348;
      --accent:  #7c6aff;
      --accent2: #a78bfa;
      --green:   #34d399;
      --yellow:  #fbbf24;
      --cyan:    #22d3ee;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --radius:  16px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    /* ── 헤더 ── */
    .header { text-align: center; margin-bottom: 32px; position: relative; width: 100%; max-width: 640px; }
    .header .emoji { font-size: 2.8rem; display: block; margin-bottom: 10px; }
    .header h1 {
      font-size: 1.8rem; font-weight: 700;
      background: linear-gradient(135deg, var(--accent2), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header p { color: var(--muted); margin-top: 8px; font-size: 0.93rem; }

    /* 설정 아이콘 */
    .setting-btn {
      position: absolute; top: 0; right: 0;
      background: none; border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted);
      width: 36px; height: 36px; cursor: pointer;
      font-size: 1rem; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .setting-btn:hover { border-color: var(--accent); color: var(--accent2); }

    /* ── 설정 모달 ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px;
      width: 90%; max-width: 480px;
    }
    .modal h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
    .modal p { font-size: 0.82rem; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
    .modal a { color: var(--accent2); text-decoration: none; }
    .key-row { display: flex; gap: 8px; }
    .key-input {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.9rem;
      padding: 10px 12px; outline: none; font-family: monospace;
      transition: border-color 0.2s;
    }
    .key-input:focus { border-color: var(--accent); }
    .key-input::placeholder { color: var(--muted); font-family: inherit; }
    .key-save-btn {
      padding: 10px 18px; background: var(--accent);
      border: none; border-radius: 8px; color: #fff;
      font-size: 0.88rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .key-save-btn:hover { opacity: 0.85; }
    .key-status { font-size: 0.78rem; color: var(--muted); margin-top: 8px; }
    .key-status.ok { color: var(--green); }
    .modal-close {
      margin-top: 18px; width: 100%; padding: 10px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); font-size: 0.88rem;
      cursor: pointer; transition: border-color 0.2s;
    }
    .modal-close:hover { border-color: var(--accent2); color: var(--text); }

    /* ── 입력 카드 ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px;
      width: 100%; max-width: 640px; margin-bottom: 14px;
    }
    .card label {
      display: block; font-size: 0.8rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 10px;
    }
    textarea {
      width: 100%; min-height: 150px; background: var(--card);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 1rem; font-family: inherit;
      line-height: 1.7; padding: 14px 16px; resize: vertical;
      outline: none; transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .btn {
      margin-top: 14px; width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent), #5b4fe8);
      border: none; border-radius: 10px; color: #fff;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s; letter-spacing: 0.02em;
    }
    .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ── 로딩 ── */
    .loading { display: none; text-align: center; padding: 28px 0; color: var(--muted); }
    .loading.show { display: block; }
    .dots span {
      display: inline-block; width: 8px; height: 8px;
      background: var(--accent); border-radius: 50%; margin: 0 3px;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%           { transform: translateY(-8px); opacity: 1; }
    }

    /* ── 에러 ── */
    .error-box {
      display: none; background: #2d1a1a; border: 1px solid #7f1d1d;
      border-radius: 10px; color: #fca5a5;
      padding: 14px 18px; margin-top: 12px; font-size: 0.88rem; line-height: 1.5;
    }
    .error-box.show { display: block; }

    /* ── 결과 ── */
    .result { display: none; width: 100%; max-width: 640px; }
    .result.show { display: block; }

    .score-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px;
      margin-bottom: 14px; text-align: center;
    }
    .score-number { font-size: 4rem; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .score-label  { color: var(--muted); font-size: 0.88rem; margin-bottom: 18px; }
    .score-bar-wrap {
      background: var(--card); border-radius: 99px;
      height: 12px; overflow: hidden; margin-bottom: 14px;
    }
    .score-bar-fill {
      height: 100%; border-radius: 99px;
      transition: width 1s cubic-bezier(.4,0,.2,1); width: 0%;
    }
    .score-reason { color: var(--muted); font-size: 0.87rem; line-height: 1.65; }

    .summary-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 22px;
      margin-bottom: 14px; font-size: 1.03rem; line-height: 1.7;
    }
    .sec-label {
      font-size: 0.72rem; font-weight: 700; color: var(--accent2);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 7px;
    }

    .trio { display: grid; gap: 12px; }
    .trio-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 22px;
    }
    .trio-card .tag {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 9px;
    }
    .trio-card p { font-size: 0.96rem; line-height: 1.7; }
    .tag-green { color: var(--green); }
    .tag-yellow{ color: var(--yellow); }
    .tag-cyan  { color: var(--cyan); }

    .color-high    { color: var(--green); }
    .color-mid     { color: var(--yellow); }
    .color-low     { color: var(--cyan); }
    .color-very-low{ color: var(--muted); }
    .bar-high    { background: linear-gradient(90deg, var(--green), #6ee7b7); }
    .bar-mid     { background: linear-gradient(90deg, var(--yellow), #fde68a); }
    .bar-low     { background: linear-gradient(90deg, var(--cyan), #a5f3fc); }
    .bar-very-low{ background: linear-gradient(90deg, var(--muted), #94a3b8); }

    .criteria {
      max-width: 640px; width: 100%; margin-top: 4px;
      font-size: 0.78rem; color: var(--muted); text-align: center; line-height: 2;
    }
    .criteria span { margin: 0 5px; }
  </style>
</head>
<body>

<!-- 설정 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>🔑 Groq API 키 설정</h2>
    <p>
      AI 평가 기능을 쓰려면 Groq API 키가 필요해요. <strong>무료</strong>로 발급받을 수 있어요!<br>
      키는 이 브라우저에만 저장되고 외부로 전송되지 않아요.<br>
      키 발급: <a href="https://console.groq.com" target="_blank">console.groq.com</a>
    </p>
    <div class="key-row">
      <input class="key-input" type="password" id="apiKeyInput"
        placeholder="gsk_..." autocomplete="off" />
      <button class="key-save-btn" onclick="saveKey()">저장</button>
    </div>
    <div class="key-status" id="keyStatus"></div>
    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>
</div>

<div class="header">
  <span class="emoji">✨</span>
  <h1>오늘 하루 평가기</h1>
  <p>오늘 한 일을 자유롭게 적으면 AI가 정확하게 평가해드려요</p>
  <button class="setting-btn" onclick="openModal()" title="API 키 설정">⚙️</button>
</div>

<!-- 텍스트 입력 -->
<div class="card">
  <label for="input">오늘 하루 어떻게 보내셨나요?</label>
  <textarea id="input"
    placeholder="예) 오전에 30분 조깅하고, 오후엔 보고서 마무리했어요. 저녁에 친구랑 통화하고 유튜브 보다 잠들었어요..."></textarea>
  <button class="btn" id="submitBtn" onclick="submitReview()">평가 받기</button>
  <div class="error-box" id="errorBox"></div>
</div>

<div class="criteria">
  평가 기준:
  <span>🏃 건강·운동</span>
  <span>💼 생산성·집중</span>
  <span>💬 관계·소통</span>
  <span>📚 성장·배움</span>
  <span>😴 휴식·자기돌봄</span>
</div>

<!-- 로딩 -->
<div class="loading" id="loading">
  <div class="dots"><span></span><span></span><span></span></div>
  <p style="margin-top:12px; font-size:0.88rem;">AI가 하루를 분석하고 있어요...</p>
</div>

<!-- 결과 -->
<div class="result" id="result">
  <div class="score-section">
    <div class="score-number" id="scoreNum">—</div>
    <div class="score-label">점 / 100점</div>
    <div class="score-bar-wrap">
      <div class="score-bar-fill" id="scoreBar"></div>
    </div>
    <div class="score-reason" id="scoreReason"></div>
  </div>
  <div class="summary-section">
    <div class="sec-label">💬 한 줄 총평</div>
    <div id="summary"></div>
  </div>
  <div class="trio">
    <div class="trio-card">
      <div class="tag tag-green">👍 잘한 점</div>
      <p id="goodPoint"></p>
    </div>
    <div class="trio-card">
      <div class="tag tag-yellow">💭 아쉬운 점</div>
      <p id="regretPoint"></p>
    </div>
    <div class="trio-card">
      <div class="tag tag-cyan">🌱 내일을 위한 한 가지</div>
      <p id="tomorrowTip"></p>
    </div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `당신은 냉정하지만 따뜻한 하루 평가 친구입니다. 점수는 엄격하게 줍니다.
반드시 모든 텍스트를 한국어로만 작성하세요. 다른 언어(영어, 태국어, 일본어 등)는 절대 사용 금지입니다.

【카테고리별 배점】
• 생산성·집중 (30점): 집중 업무·공부 2시간 미만→5점, 4시간→15점, 6시간 이상→25~30점
• 건강·운동 (25점): 운동 1시간 미만→5점, 1시간→13점, 2시간 이상→22~25점
• 성장·배움 (20점): 새로운 시도·독서·학습 없음→3점, 약간→8점, 충실→16~20점
• 관계·소통 (15점): 의미 있는 대화·만남 없음→2점, 가벼운 연락→6점, 깊은 교류→12~15점
• 휴식·자기돌봄 (10점): 쉬기만 한 하루→1점, 적당한 휴식(바쁜 하루 끝)→7~8점, 균형 잡힌 휴식→9~10점
  ※ 휴식은 보조 점수일 뿐 — 아무것도 안 하고 쉰 하루는 절대 고점 불가

【점수 보정 기준 — 반드시 이 기준을 따를 것】
- 10~30점: 거의 아무것도 안 한 하루 (쉬기만 한 하루 포함)
- 30~50점: 한두 가지만 한 평범한 하루
- 50~65점: 나름 했지만 빠진 영역이 많은 하루
- 65~80점: 생산성·운동 중 하나를 충실히 채운 하루
- 80~90점: 운동+집중업무를 모두 열심히 한 알찬 하루
- 90~95점: 운동 2시간+집중업무 6시간+성장까지 갖춘 탁월한 하루
- 95~100점: 모든 카테고리를 바쁘고 알차게 채운 거의 완벽한 하루

【채점 규칙】
- 언급되지 않은 카테고리는 기본 3점만 부여
- 짧게 언급만 한 활동은 낮게 평가
- 시간·강도·구체성이 높을수록 점수 높게 평가
- 후한 점수는 절대 금지 — 평균적인 사람의 평균적인 하루는 45~55점
- 점수는 반드시 세부적으로 계산할 것: 카테고리별로 정확히 몇 점인지 따진 뒤 합산
- 절대로 5의 배수나 짝수로 끝나는 점수를 주지 말 것 (예: 70, 75, 80, 85 금지)
- 실제 계산 결과를 그대로 써야 함 (예: 73, 67, 88, 91, 54 같은 불규칙한 정수)
- score_reason에는 카테고리별 점수를 명시할 것 (예: "건강 17 + 생산성 19 + 관계 4 + 성장 5 + 휴식 16 = 61점")

【말투 규칙】
- 친한 친구처럼 자연스럽고 따뜻하게
- 아쉬운 점은 솔직하게, 그러나 공감하는 톤으로

반드시 아래 JSON 형식으로만 응답하세요 (다른 텍스트 없이):
{
  "score": 정수(0~100),
  "score_reason": "점수 이유를 한두 문장으로",
  "summary": "하루 전체를 한 줄로 총평",
  "good_point": "잘한 점 한 가지",
  "regret_point": "아쉬운 점 한 가지",
  "tomorrow_tip": "내일을 위한 개선 방법 한 가지"
}`;

// ── 모달 ──────────────────────────────────────────────────────────────────────
function openModal() {
  const saved = localStorage.getItem('groq_key');
  if (saved) {
    document.getElementById('apiKeyInput').value = saved;
    setKeyStatus('✓ 저장된 키가 있어요.', true);
  }
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ── API 키 ────────────────────────────────────────────────────────────────────
function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (val.length < 10) {
    setKeyStatus('키가 너무 짧아요. 다시 확인해주세요.', false);
    return;
  }
  localStorage.setItem('groq_key', val);
  setKeyStatus('✓ 저장됐어요!', true);
  setTimeout(closeModal, 800);
}

function getKey() {
  return localStorage.getItem('groq_key') || '';
}

function setKeyStatus(msg, ok) {
  const el = document.getElementById('keyStatus');
  el.textContent = msg;
  el.className = 'key-status' + (ok ? ' ok' : '');
}

// ── 색상 헬퍼 ─────────────────────────────────────────────────────────────────
function colorClasses(score) {
  if (score >= 80) return ['color-high', 'bar-high'];
  if (score >= 60) return ['color-mid',  'bar-mid'];
  if (score >= 40) return ['color-low',  'bar-low'];
  return ['color-very-low', 'bar-very-low'];
}
function scoreEmoji(s) {
  return s>=90?'🌟':s>=80?'😊':s>=70?'🙂':s>=60?'😐':s>=50?'😕':'😔';
}

function showError(msg) {
  const b = document.getElementById('errorBox');
  b.textContent = '⚠️  ' + msg;
  b.classList.add('show');
}
function hideError() { document.getElementById('errorBox').classList.remove('show'); }

function renderResult(data) {
  const score = data.score;
  const [cc, bc] = colorClasses(score);

  const numEl = document.getElementById('scoreNum');
  numEl.textContent = scoreEmoji(score) + '  ' + score;
  numEl.className = 'score-number ' + cc;

  const bar = document.getElementById('scoreBar');
  bar.className = 'score-bar-fill ' + bc;
  setTimeout(() => { bar.style.width = score + '%'; }, 50);

  document.getElementById('scoreReason').textContent  = data.score_reason;
  document.getElementById('summary').textContent      = data.summary;
  document.getElementById('goodPoint').textContent    = data.good_point;
  document.getElementById('regretPoint').textContent  = data.regret_point;
  document.getElementById('tomorrowTip').textContent  = data.tomorrow_tip;

  document.getElementById('result').classList.add('show');
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── 평가 실행 ─────────────────────────────────────────────────────────────────
async function submitReview() {
  const text = document.getElementById('input').value.trim();
  const apiKey = getKey();

  hideError();

  if (!text) { showError('오늘 하루 내용을 입력해주세요!'); return; }
  if (!apiKey) {
    showError('⚙️ 오른쪽 위 설정 버튼을 눌러 API 키를 먼저 입력해주세요.');
    openModal();
    return;
  }

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('result').classList.remove('show');
  document.getElementById('scoreBar').style.width = '0%';
  document.getElementById('loading').classList.add('show');

  try {
    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'Authorization': `Bearer ${apiKey}`,
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: `오늘 내가 한 일들:\n\n${text}` },
        ],
        response_format: { type: 'json_object' },
        max_tokens: 1024,
      }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      const msg = err?.error?.message || `HTTP ${resp.status}`;
      if (resp.status === 401) {
        showError('API 키가 올바르지 않아요. ⚙️ 설정에서 다시 확인해주세요.');
        openModal();
      } else {
        throw new Error(msg);
      }
      return;
    }

    const data = await resp.json();
    const raw = data.choices[0].message.content.trim();
    const result = JSON.parse(raw);
    renderResult(result);

  } catch (err) {
    showError(err.message || '오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('submitBtn').disabled = false;
  }
}

// ── 초기화 ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (!getKey()) openModal();  // 키 없으면 첫 방문 시 자동으로 모달 열기
  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) submitReview();
  });
});
</script>

</body>
</html>
